<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <!-- Optie 2: gestileerde procesbalk — symbool voor "waar staat het in het proces" -->
  <rect width="1000" height="1000" fill="#eee8d8"/>
  <!-- Drie bolletjes met verbinding ertussen, midden hoogte -->
  <g transform="translate(500 500)">
    <!-- Lijn tussen bolletjes -->
    <line x1="-280" y1="0" x2="280" y2="0" stroke="#2c5a6a" stroke-width="14" opacity="0.5"/>
    <!-- Voltooid (gevuld) -->
    <circle cx="-280" cy="0" r="70" fill="#2c5a6a"/>
    <path d="M -310 0 L -290 25 L -250 -25" stroke="#eee8d8" stroke-width="18" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Huidig (pulserend, dik rand) -->
    <circle cx="0" cy="0" r="90" fill="#eee8d8" stroke="#2c5a6a" stroke-width="22"/>
    <circle cx="0" cy="0" r="34" fill="#2c5a6a"/>
    <!-- Toekomst (leeg, dunne rand) -->
    <circle cx="280" cy="0" r="70" fill="#eee8d8" stroke="#0e1632" stroke-width="10" opacity="0.4"/>
  </g>
  <!-- Klein wm-label onderin -->
  <text x="500" y="900"
    font-family="ui-serif, Georgia, serif"
    font-size="100" font-style="italic" fill="#0e1632" text-anchor="middle"
    opacity="0.85">wm</text>
</svg>

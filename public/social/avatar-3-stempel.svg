<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <!-- Optie 3: officiele "stempel"-look — bredere acceptatie, oogt formeel -->
  <rect width="1000" height="1000" fill="#eee8d8"/>
  <!-- Buitenring -->
  <circle cx="500" cy="500" r="380" fill="none" stroke="#2c5a6a" stroke-width="14"/>
  <!-- Binnenring iets dunner -->
  <circle cx="500" cy="500" r="350" fill="none" stroke="#2c5a6a" stroke-width="3"/>
  <!-- Bovenrand: kleine tekst boven (Wetgevingsmonitor wordmark) -->
  <defs>
    <path id="bovenboog" d="M 200 500 a 300 300 0 0 1 600 0" fill="none"/>
    <path id="onderboog" d="M 220 500 a 280 280 0 0 0 560 0" fill="none"/>
  </defs>
  <text font-family="ui-serif, Georgia, serif" font-size="70" font-weight="600" fill="#0e1632" letter-spacing="6">
    <textPath href="#bovenboog" startOffset="50%" text-anchor="middle">WETGEVINGSMONITOR</textPath>
  </text>
  <text font-family="ui-serif, Georgia, serif" font-size="42" fill="#2c5a6a" letter-spacing="8">
    <textPath href="#onderboog" startOffset="50%" text-anchor="middle">·  Den Haag  ·  Live  ·</textPath>
  </text>
  <!-- Middelpunt: serif W -->
  <text x="500" y="620" font-family="ui-serif, Georgia, serif" font-size="320" font-weight="700"
    fill="#2c5a6a" text-anchor="middle" letter-spacing="-12">Wm</text>
</svg>

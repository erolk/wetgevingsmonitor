name: EK-status verversen

# Scrapet wekelijks de Eerste Kamer-voortgang per wetsvoorstel en commit de
# bijgewerkte data/ek-status.json. Een push naar main triggert automatisch een
# Vercel-redeploy, dus de site toont daarna de verse EK-fasen.
#
# TK-data hoeft niet gescrapet te worden — die wordt live opgehaald met een
# dagelijkse cache. Alleen EK heeft geen API en moet gescrapet worden.

on:
  schedule:
    # Elke maandag 06:00 UTC (07:00/08:00 NL-tijd)
    - cron: "0 6 * * 1"
  workflow_dispatch: {} # handmatig te starten via de Actions-tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Geen --force: terminale states (Staatsblad/verworpen/ingetrokken)
      # worden overgeslagen, dus alleen de ~46 actieve EK-wetten + nieuwe
      # afgedane wetten worden gescrapet. Houdt de wekelijkse run licht (~1 min)
      # en belast de EK-server niet onnodig.
      - name: Scrape EK-status
        run: node scripts/fetch-ek-status.mjs

      # Wekelijkse asielinstroom (Rijksoverheid) voor de migratiepact-pagina.
      # || true: faalt deze broze HTML-scrape, dan blokkeert dat de EK-update
      # hierboven niet.
      - name: Scrape asielinstroom (week)
        run: node scripts/fetch-asielinstroom.mjs || true

      - name: Commit & push bij wijziging
        run: |
          if [[ -n "$(git status --porcelain data/ek-status.json data/asielinstroom-week.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/ek-status.json data/asielinstroom-week.json
            git commit -m "chore: wekelijkse EK-status + asielinstroom update [skip ci]"
            git push
            echo "Data bijgewerkt en gepusht."
          else
            echo "Geen wijzigingen — niets te committen."
          fi

      # Cache van de site leeggooien zodat de verse data direct zichtbaar is.
      # || true: faalt de webhook (bv. site even niet bereikbaar) dan blokkeert
      # dat de rest van de run niet — de eerstvolgende dagelijkse refresh haalt
      # 'm vanzelf bij.
      - name: Cache vernieuwen op de site
        if: ${{ env.REVALIDATE_URL != '' }}
        env:
          REVALIDATE_URL: ${{ secrets.REVALIDATE_URL }}
        run: curl -fsS -X POST "$REVALIDATE_URL" || true
